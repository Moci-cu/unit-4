monitor=,preferred,auto,1

# ── Autostart ──
# systemd user services (robust: auto-restart, idempotent, no double-spawn)
exec-once = systemctl --user start quickshell.service
exec-once = systemctl --user start awww-daemon.service
exec-once = systemctl --user start udiskie.service
exec-once = systemctl --user start polkit-kde-agent.service
exec-once = systemctl --user start battery-warning.service
exec-once = systemctl --user start hypridle.service
exec-once = systemctl --user start wave-check.service

# Kill stray notification daemons (Quickshell handles notifications)
exec-once = pkill dunst
exec-once = pkill mako
exec-once = pkill swaync
# ── Environnement ──
env = PATH,/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/bin:/sbin
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QUICK_CONTROLS_STYLE,Basic
env = QT_QUICK_FLICKABLE_WHEEL_DECELERATION,10000

# ── Entrée ──
input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
        scroll_factor = 1.0
        clickfinger_behavior = true
    }
}

# ── Général ──
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(c8b89aee)
    col.inactive_border = rgba(1a1814aa)
    layout = dwindle
}

# ── Décoration ──
decoration {
    rounding = 0
}

# ── Misc — CPU saving ──
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    vfr = 1
}

# ── Animations (disabled — CPU saving) ──
animations {
    enabled = false 
}

# ── Layout dwindle ──
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Layout master ──
master {
    new_status = master
    mfact = 0.55
}

# ── Règles fenêtres Quickshell ──
windowrule = float on,     match:class ^(quickshell)$
windowrule = pin on,       match:class ^(quickshell)$
windowrule = no_blur on,   match:class ^(quickshell)$
windowrule = no_shadow on, match:class ^(quickshell)$
windowrule = workspace special:spotify, match:class ^(Spotify)$
windowrule = fullscreen on,             match:class ^(Spotify)$

# ── Layer rules — xray on (prevent unnecessary blur compositing) ──
layerrule = match:namespace quickshell, xray on
layerrule = match:namespace notifications, xray on
layerrule = match:namespace quickshell-bar, xray on
layerrule = match:namespace quickshell-network, xray on
layerrule = match:namespace quickshell-network, no_anim on
layerrule = match:namespace awww-daemon, xray on
layerrule = match:namespace quickshell, no_anim on
layerrule = match:namespace notifications, no_anim on

# ══════════════════════════════════════════════════
# RACCOURCIS
# ══════════════════════════════════════════════════

# ── Launcher (menu applications) ──
bindr = SUPER, Super_L, exec, qs ipc call menu toggle    # SUPER + SUPER → ouvre/ferme le menu

# ── Lockscreen Quickshell ──
bindd = Super, L, Lock, exec, loginctl lock-session
bindld = Super+Shift, L, Suspend system, exec, systemctl suspend || loginctl suspend

bindd = Super, R, System panel, global, quickshell:syspanelToggle
bindd = Super, N, Network panel, global, quickshell:networkToggle
bindd = Super, J, Toggle bar, global, quickshell:barToggle

# ── Applications ──
bind = SUPER, T, exec, /usr/bin/kitty
bind = SUPER, W, exec, /opt/zen-browser-bin/zen-bin # Browser
bind = SUPER, M, exec, pgrep -x spotify >/dev/null && hyprctl dispatch togglespecialworkspace spotify || spotify
bindd = Super+Shift, BackSpace, Restart QS, exec, pkill qs
bind = SUPER, P, exec, ~/.config/quickshell/wallpaper.sh

# ── Gestion des fenêtres ──
bind = SUPER, Q,      killactive
bind = SUPER, F,      fullscreen
bind = SUPER, V,      togglefloating
bind = SUPER, Escape, exit
bind = SUPER, D,      fullscreen, 1
bind = SUPER SHIFT, W, exec, hyprctl keyword general:layout dwindle

# ── Focus ──
bind = ALT,       Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

# ── Focus directionnel ──
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# ── Déplacement de fenêtre ──
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d

# ── Special workspace ──
bind = SUPER SHIFT, S, movetoworkspace, special:magic
bind = SUPER,       S, togglespecialworkspace, magic

# ── Workspaces — SUPER + AZERTY ──
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# ── Déplacer vers workspace ──
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# ── Scroll workspaces ──
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1

# ── Souris ──
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ── Audio ──
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ── Luminosité ──
bind = , XF86MonBrightnessUp,   exec, sh -c 'brightnessctl set 5%+; qs ipc call brightness increment'
bind = , XF86MonBrightnessDown, exec, sh -c 'brightnessctl set 5%-; qs ipc call brightness decrement'

# ── Capture d'écran ──
bind = ALT SHIFT, S, exec, hyprshot -m region 
bind = , Print, exec, grim -g "$(slurp)" ~/Screenshots/$(date +%Y%m%d_%H%M%S).png



# ── XWayland optimization ──
xwayland {
  force_zero_scaling = true
}


# ═══════════════════════════════════════════════════════════════════
# User overrides — see user.conf
# This file is created empty by the installer and is NEVER overwritten
# by future updates. Put your monitor setup, custom binds, env vars,
# theme tweaks, etc. there.
# ═══════════════════════════════════════════════════════════════════
source = ~/.config/hypr/user.conf
